x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow.Dockerfile
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
  volumes:
    - ./container/dags:/opt/airflow/dags
    - ./container/logs:/opt/airflow/logs
    - ./container/config:/opt/airflow/config
    - ./ingestion:/opt/airflow/ingestion
    - ./dbt:/opt/airflow/dbt
  depends_on:
    postgres-airflow:
      condition: service_healthy
    postgres-warehouse:
      condition: service_healthy
  networks:
    - de_network

services:
  postgres-airflow:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    volumes:
      - airflow-db-volume:/var/lib/postgresql/data
    networks:
      - de_network

  postgres-warehouse:
    image: postgres:15
    environment:
      POSTGRES_USER: warehouse
      POSTGRES_PASSWORD: warehouse
      POSTGRES_DB: online_retail
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "warehouse"]
      interval: 5s
      retries: 5
    volumes:
      - warehouse-db-volume:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - de_network

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true"
    restart: "no"
    depends_on:
      postgres-airflow:
        condition: service_healthy
      postgres-warehouse:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "127.0.0.1:8088:8080"
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully 

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  metabase:
    image: metabase/metabase:latest
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: warehouse
      MB_DB_PASS: warehouse
      MB_DB_HOST: postgres-warehouse
    depends_on:
      postgres-warehouse:
        condition: service_healthy
    networks:
      - de_network

networks:
  de_network:
    driver: bridge

volumes:
  airflow-db-volume:
  warehouse-db-volume: